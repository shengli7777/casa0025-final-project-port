project:
  type: website
  output-dir: docs
  resources:
    - images/
    - toc-active.js

website:
  title: "Singapore Shipping Activity Dashboard"
  favicon: images/ship-mark.svg

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-title: "Contents"
    toc-location: right
    toc-depth: 3
    include-after-body: _includes/toc-active.html
    code-copy: true
    code-overflow: wrap
    highlight-style: monokai.theme
    linkcolor: "#1e6fa8"
